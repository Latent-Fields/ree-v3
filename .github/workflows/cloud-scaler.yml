name: Cloud Worker Scaler
# Auto-starts each Hetzner cloud worker when experiments matching its
# machine_affinity are queued, stops it when no matching work remains.
#
# Routing rules (per worker):
#   - "claimable" items = status==pending AND machine_affinity in {any, <server_affinity>}
#   - server off + claimable > 0 -> poweron
#   - server running + claimable == 0 -> shutdown (graceful, drains current run)

on:
  schedule:
    - cron: '*/15 * * * *'  # every 15 minutes
  workflow_dispatch: {}       # manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: experiment_queue.json

      - name: Check queue and scale cloud workers
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          set -euo pipefail

          # Install hcloud CLI
          HCLOUD_VERSION="v1.43.0"
          curl -sL "https://github.com/hetznercloud/cli/releases/download/${HCLOUD_VERSION}/hcloud-linux-amd64.tar.gz" \
            | tar xz -C /usr/local/bin hcloud

          # server_name:affinity pairs -- add more workers by extending this list
          WORKERS=(
            "ree-worker-1:ree-cloud-1"
            "ree-worker-2:ree-cloud-2"
          )

          for entry in "${WORKERS[@]}"; do
            SERVER_NAME="${entry%%:*}"
            AFFINITY="${entry##*:}"

            # Count pending items this worker could claim (its affinity or "any")
            CLAIMABLE=$(AFFINITY="$AFFINITY" python3 -c "
          import json, os
          aff = os.environ['AFFINITY']
          q = json.load(open('experiment_queue.json'))
          n = sum(
              1 for i in q.get('items', [])
              if i.get('status') == 'pending'
              and i.get('machine_affinity') in ('any', aff)
          )
          print(n)
          ")

            # Get current server status (off, running, starting, stopping, unknown)
            STATUS=$(hcloud server describe "$SERVER_NAME" -o format='{{.Status}}' 2>/dev/null || echo "unknown")

            echo "[$SERVER_NAME affinity=$AFFINITY] claimable=$CLAIMABLE status=$STATUS"

            if [ "$STATUS" = "unknown" ]; then
              echo "  -> server not provisioned yet, skipping"
              continue
            fi

            if [ "$CLAIMABLE" -gt 0 ] && [ "$STATUS" = "off" ]; then
              echo "  -> queue has work, starting $SERVER_NAME"
              hcloud server poweron "$SERVER_NAME"
            elif [ "$CLAIMABLE" -eq 0 ] && [ "$STATUS" = "running" ]; then
              echo "  -> no matching work, shutting down $SERVER_NAME"
              # shutdown (not poweroff) so systemd sends SIGTERM for graceful drain
              hcloud server shutdown "$SERVER_NAME"
            else
              echo "  -> no action needed"
            fi
          done
