name: Cloud Worker Scaler
# Auto-starts each Hetzner cloud worker when experiments matching its
# machine_affinity are queued, stops it when no matching work remains.
#
# Routing rules (per worker):
#   - "claimable" items = status==pending AND machine_affinity in {any, <server_affinity>}
#   - mode "full" (default): server off + claimable > 0 -> poweron
#   - mode "shutdown-only": never auto-starts; must be powered on manually
#   - mode "surge": auto-start only when (claimable >= SURGE_QUEUE_THRESHOLD)
#       AND (cloud-2 + cloud-3 are both running with held claims). Designed
#       so cloud-4 acts as overflow capacity behind cloud-2/3, taking on
#       work that would otherwise pull in the laptop (DLAPTOP-4.local). See
#       Lever 2 in the "prefer cloud over laptop" proposal 2026-05-31.
#   - server running + claimable == 0 + heartbeat says idle + last completed > IDLE_GRACE_MIN ago
#       -> shutdown (graceful, drains current run) [applies to all modes]
#
# The heartbeat gate prevents the race where the queue momentarily reads zero
# pending items because the runner has just claimed an item and is mid-experiment;
# without it, the scaler would issue SIGTERM mid-manifest-write (the V3-EXQ-244a /
# V3-EXQ-541 SIGTERM signature). The recent_completed gate adds a second layer:
# even if the heartbeat shows idle, we wait IDLE_GRACE_MIN after the last
# completed experiment before powering off, so a back-to-back claim has time to
# land before the box goes down.
#
# Active-claim guard (2026-05-30): the heartbeat gate alone is not enough. If a
# worker is mid-experiment AND its heartbeat has gone >1h stale (broken heartbeat
# flow, long synchronous step, or post-result-push-pre-next-claim window), the
# stale branch sets idle_ok=1 reason=heartbeat_stale -- and the pending-only
# CLAIMABLE count is zero because the worker has already claimed its item, so
# the worker is shut down mid-run. Authoritative invariant: a worker with a
# claimed-and-not-completed item never gets shut down. Implemented via the
# HELD_BY_SELF count below, gated before any shutdown branch.

on:
  schedule:
    - cron: '*/15 * * * *'  # every 15 minutes
  workflow_dispatch: {}       # manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IDLE_GRACE_MIN: 20          # min minutes since last completed before shutdown
  HEARTBEAT_FRESH_MIN: 5      # heartbeat must be at most this many minutes stale
  SURGE_QUEUE_THRESHOLD: 3    # claimable items required before a surge-mode worker is powered on
  # The coordinator hub VM must NEVER be considered for shutdown by the scaler.
  # ree-worker-1 runs ree-coordinator + ree-sync-daemon at 10.8.0.1:8787 (the
  # Phase-3 git writer hub). On 2026-05-28 the scaler powered the hub off
  # because cloud-1's ree-runner was systemctl-disabled (separate hub/runner
  # co-location fix), so the scaler saw the VM as an idle worker. Recovery
  # required `hcloud server poweron ree-worker-1` + manually disabling this
  # workflow. The HUB_NAME guard in the loop body skips the hub before any
  # shutdown decision can be made. If the hub ever moves to a different VM,
  # update HUB_NAME here AND on the hub VM itself (hostname + coordinator/
  # sync-daemon systemd units).
  HUB_NAME: ree-worker-1

jobs:
  scale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: experiment_queue.json
          path: ree-v3

      - uses: actions/checkout@v4
        with:
          repository: Latent-Fields/REE_assembly
          sparse-checkout: evidence/experiments/runner_heartbeats
          path: ree-assembly

      - name: Set up hub SSH key (best-effort shutdown_notify announcer)
        # Optional: when HUB_SSH_KEY is set, the scaler can SSH into the
        # coordinator hub and POST /shutdown_notify before issuing
        # `hcloud server shutdown`. This lets /shadow/status return
        # lifecycle_state=gracefully_offline instead of stale for surge-
        # pool workers, so preflight gates and the explorer UI distinguish
        # "intentionally offline" from "silent failure."
        # Without HUB_SSH_KEY the workflow runs exactly as before
        # (shutdown announcement skipped; lifecycle_state stays stale until
        # the watchdog window expires).
        env:
          HUB_SSH_KEY: ${{ secrets.HUB_SSH_KEY }}
        run: |
          if [ -z "${HUB_SSH_KEY:-}" ]; then
            echo "[scaler] HUB_SSH_KEY not configured -- shutdown_notify announces will be skipped"
            echo "HUB_SSH_READY=0" >> $GITHUB_ENV
            exit 0
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$HUB_SSH_KEY" > ~/.ssh/hub_key
          chmod 600 ~/.ssh/hub_key
          # Pin hub host key to avoid TOFU on every run; HUB_SSH_HOST_KEY
          # secret holds one or more lines from `ssh-keyscan <hub-ip>`.
          # When absent we fall back to StrictHostKeyChecking=no -- this
          # workflow's threat model already trusts the GH-secrets surface;
          # the announcement payload itself is non-sensitive.
          if [ -n "${{ secrets.HUB_SSH_HOST_KEY }}" ]; then
            printf '%s\n' "${{ secrets.HUB_SSH_HOST_KEY }}" >> ~/.ssh/known_hosts
            chmod 600 ~/.ssh/known_hosts
          fi
          echo "HUB_SSH_READY=1" >> $GITHUB_ENV

      - name: Check queue + heartbeats and scale cloud workers
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          HUB_SSH_USER: ${{ vars.HUB_SSH_USER || 'ree' }}
          HUB_SSH_HOST: ${{ vars.HUB_SSH_HOST || '91.98.130.117' }}
        run: |
          set -euo pipefail

          # Install hcloud CLI
          HCLOUD_VERSION="v1.43.0"
          curl -sL "https://github.com/hetznercloud/cli/releases/download/${HCLOUD_VERSION}/hcloud-linux-amd64.tar.gz" \
            | tar xz -C /usr/local/bin hcloud

          # server_name:affinity[:mode] pairs -- add more workers by extending this list
          # mode "shutdown-only" = auto-shutdown when idle but never auto-start
          # mode "surge"         = auto-start only when cloud-2 + cloud-3 saturated
          #                        AND claimable >= SURGE_QUEUE_THRESHOLD
          WORKERS=(
            "ree-worker-1:ree-cloud-1"
            "ree-worker-2:ree-cloud-2"
            "ree-worker-3:ree-cloud-3"
            "ree-worker-4:ree-cloud-4:surge"
          )

          # Track per-affinity state across the loop so the surge-mode branch
          # can read sister-worker status (cloud-2 + cloud-3) when deciding
          # whether to power on cloud-4. Bash associative arrays require
          # `declare -A`; ordering of the WORKERS list guarantees cloud-2 and
          # cloud-3 iterate before cloud-4.
          declare -A WORKER_STATUS=()
          declare -A WORKER_HELD=()

          for entry in "${WORKERS[@]}"; do
            IFS=: read -r SERVER_NAME AFFINITY MODE <<< "$entry"
            MODE="${MODE:-full}"

            # HUB GUARD: the coordinator hub VM must never be powered off by
            # the scaler. Skip the entire iteration -- no status read, no
            # power-on, no shutdown decision. See env.HUB_NAME comment above
            # for the 2026-05-28 incident this guards against.
            if [ "$SERVER_NAME" = "$HUB_NAME" ]; then
              echo "[$SERVER_NAME affinity=$AFFINITY] HUB_NAME match -- scaler skips hub VM (no power-on, no shutdown)"
              continue
            fi

            # Count pending items this worker could claim (its affinity or "any")
            CLAIMABLE=$(AFFINITY="$AFFINITY" python3 -c "
          import json, os
          aff = os.environ['AFFINITY']
          q = json.load(open('ree-v3/experiment_queue.json'))
          n = sum(
              1 for i in q.get('items', [])
              if i.get('status') == 'pending'
              and i.get('machine_affinity') in ('any', aff)
          )
          print(n)
          ")

            # Count items this worker is currently CLAIMED on. Without this,
            # a worker that has just transitioned a pending item to claimed
            # is invisible to the pending-only CLAIMABLE count above, so on
            # the next 15-min tick (with heartbeat possibly stale because a
            # long experiment hasn't refreshed it) the scaler would shut
            # it down mid-claim. This is the 2026-05-30 fleet incident
            # (V3-EXQ-483e on cloud-2, V3-EXQ-614a on cloud-3 powered off
            # mid-run). Treat any held claim as work-in-flight: do NOT
            # shutdown while the held count is > 0, regardless of idle
            # gate or heartbeat staleness. The held count and the pending
            # count are kept as separate diagnostics so the log line shows
            # which path is keeping the worker alive.
            HELD_BY_SELF=$(AFFINITY="$AFFINITY" python3 -c "
          import json, os
          aff = os.environ['AFFINITY']
          q = json.load(open('ree-v3/experiment_queue.json'))
          n = 0
          for i in q.get('items', []):
              if i.get('status') != 'claimed':
                  continue
              cb = i.get('claimed_by') or {}
              # claimed_by is the canonical nested form ({machine, claimed_at});
              # accept a bare string form as a fallback for legacy queue entries.
              machine = cb.get('machine') if isinstance(cb, dict) else cb
              if machine == aff:
                  n += 1
          print(n)
          ")

            # Read heartbeat to decide whether the runner is genuinely idle.
            # idle_ok is "1" when:
            #   - heartbeat file exists and is fresh (last_tick_utc within HEARTBEAT_FRESH_MIN)
            #   - state == "idle"
            #   - current_exq is null
            #   - newest recent_completed.completed_at is older than IDLE_GRACE_MIN
            # OR the heartbeat is missing/very stale (> 1 hour) -- runner already dead,
            # safe to power off.
            IDLE_INFO=$(AFFINITY="$AFFINITY" \
              IDLE_GRACE_MIN="${IDLE_GRACE_MIN}" \
              HEARTBEAT_FRESH_MIN="${HEARTBEAT_FRESH_MIN}" \
              python3 -c "
          import json, os, sys
          from datetime import datetime, timezone, timedelta
          aff = os.environ['AFFINITY']
          grace = int(os.environ['IDLE_GRACE_MIN'])
          fresh = int(os.environ['HEARTBEAT_FRESH_MIN'])
          path = f'ree-assembly/evidence/experiments/runner_heartbeats/{aff}.json'
          now = datetime.now(timezone.utc)

          def parse_utc(s):
              if not s: return None
              try:
                  return datetime.fromisoformat(s.replace('Z','+00:00'))
              except Exception:
                  return None

          if not os.path.exists(path):
              # Never heartbeated -- treat as 'idle' (runner not running)
              print('idle_ok=1 reason=no_heartbeat')
              sys.exit(0)

          with open(path) as f:
              hb = json.load(f)
          last_tick = parse_utc(hb.get('last_tick_utc'))
          state = hb.get('state')
          current_exq = hb.get('current_exq')
          completed = hb.get('recent_completed') or []
          last_completed = None
          for c in completed:
              t = parse_utc(c.get('completed_at'))
              if t and (last_completed is None or t > last_completed):
                  last_completed = t

          # Heartbeat very stale -> runner dead; safe to shutdown
          if last_tick is None or (now - last_tick) > timedelta(hours=1):
              print('idle_ok=1 reason=heartbeat_stale')
              sys.exit(0)
          # Heartbeat moderately stale -> uncertain; do NOT shutdown
          if (now - last_tick) > timedelta(minutes=fresh):
              print('idle_ok=0 reason=heartbeat_aging')
              sys.exit(0)
          # Runner says it's working
          if state != 'idle' or current_exq is not None:
              print(f'idle_ok=0 reason=state_{state}_current_{current_exq}')
              sys.exit(0)
          # Runner idle, but last completion is recent -> grace window not yet expired
          if last_completed is not None and (now - last_completed) < timedelta(minutes=grace):
              age_min = int((now - last_completed).total_seconds() // 60)
              print(f'idle_ok=0 reason=grace_window_age={age_min}min')
              sys.exit(0)
          print('idle_ok=1 reason=clean_idle')
          ")
            IDLE_OK=$(echo "$IDLE_INFO" | sed -n 's/^idle_ok=\([01]\) .*/\1/p')

            # Get current server status (off, running, starting, stopping, unknown)
            STATUS=$(hcloud server describe "$SERVER_NAME" -o format='{{.Status}}' 2>/dev/null || echo "unknown")

            # Stash per-affinity state so the surge-mode branch on a later
            # worker (cloud-4) can read sister-worker status (cloud-2 / cloud-3).
            WORKER_STATUS[$AFFINITY]="$STATUS"
            WORKER_HELD[$AFFINITY]="$HELD_BY_SELF"

            echo "[$SERVER_NAME affinity=$AFFINITY] claimable=$CLAIMABLE held_by_self=$HELD_BY_SELF status=$STATUS $IDLE_INFO"

            if [ "$STATUS" = "unknown" ]; then
              echo "  -> server not provisioned yet, skipping"
              continue
            fi

            if [ "$CLAIMABLE" -gt 0 ] && [ "$STATUS" = "off" ] && [ "$MODE" = "full" ]; then
              echo "  -> queue has work, starting $SERVER_NAME"
              hcloud server poweron "$SERVER_NAME"
            elif [ "$STATUS" = "off" ] && [ "$MODE" = "surge" ]; then
              # Surge mode: cloud-4 powers on only when cloud-2 + cloud-3 are
              # both running with claims held AND queue depth >= threshold.
              # Designed to make cloud-4 the overflow before the laptop is
              # ever pulled in. Sister-worker state read from WORKER_STATUS /
              # WORKER_HELD populated above (cloud-2 + cloud-3 iterate first).
              CLOUD_2_STATUS="${WORKER_STATUS[ree-cloud-2]:-unknown}"
              CLOUD_2_HELD="${WORKER_HELD[ree-cloud-2]:-0}"
              CLOUD_3_STATUS="${WORKER_STATUS[ree-cloud-3]:-unknown}"
              CLOUD_3_HELD="${WORKER_HELD[ree-cloud-3]:-0}"
              if [ "$CLAIMABLE" -ge "$SURGE_QUEUE_THRESHOLD" ] \
                 && [ "$CLOUD_2_STATUS" = "running" ] && [ "$CLOUD_2_HELD" -gt 0 ] \
                 && [ "$CLOUD_3_STATUS" = "running" ] && [ "$CLOUD_3_HELD" -gt 0 ]; then
                echo "  -> surge conditions met (claimable=$CLAIMABLE>=$SURGE_QUEUE_THRESHOLD, cloud-2 running+held=$CLOUD_2_HELD, cloud-3 running+held=$CLOUD_3_HELD), starting $SERVER_NAME"
                hcloud server poweron "$SERVER_NAME"
              else
                echo "  -> surge mode but conditions not met (claimable=$CLAIMABLE/threshold=$SURGE_QUEUE_THRESHOLD, cloud-2=$CLOUD_2_STATUS/held=$CLOUD_2_HELD, cloud-3=$CLOUD_3_STATUS/held=$CLOUD_3_HELD)"
              fi
            elif [ "$CLAIMABLE" -gt 0 ] && [ "$STATUS" = "off" ] && [ "$MODE" = "shutdown-only" ]; then
              echo "  -> queue has work but $SERVER_NAME is shutdown-only (manual start required)"
            elif [ "$HELD_BY_SELF" -gt 0 ] && [ "$STATUS" = "running" ]; then
              # Worker is holding an active claim. Do NOT shutdown even when
              # CLAIMABLE=0 and IDLE_OK=1 (e.g. heartbeat_stale because a long
              # experiment hasn't refreshed it). Authoritative invariant:
              # claimed-and-not-completed beats every shutdown signal.
              # 2026-05-30 fleet incident guard.
              echo "  -> worker holds $HELD_BY_SELF active claim(s), keeping $SERVER_NAME running"
            elif [ "$CLAIMABLE" -eq 0 ] && [ "$STATUS" = "running" ] && [ "$IDLE_OK" = "1" ]; then
              echo "  -> no matching work AND runner idle past grace window, shutting down $SERVER_NAME"
              # Announce shutdown to the coordinator BEFORE issuing hcloud
              # shutdown, so lifecycle_state flips to gracefully_offline
              # immediately rather than waiting on the runner's SIGTERM
              # handler (which would miss this signal if the runner is
              # already crashed). Best-effort: a failed announcement does
              # NOT block the actual shutdown.
              if [ "${HUB_SSH_READY:-0}" = "1" ]; then
                ssh -o StrictHostKeyChecking=accept-new \
                    -o ConnectTimeout=10 -o BatchMode=yes \
                    -i ~/.ssh/hub_key \
                    "${HUB_SSH_USER}@${HUB_SSH_HOST}" \
                    "/usr/local/bin/coordinator_announce_shutdown.sh '$AFFINITY'" \
                    && echo "    [scaler] announced shutdown_notify for $AFFINITY" \
                    || echo "    [scaler] WARN: shutdown_notify announce failed for $AFFINITY (proceeding)"
              fi
              # shutdown (not poweroff) so systemd sends SIGTERM for graceful drain
              hcloud server shutdown "$SERVER_NAME"
            else
              echo "  -> no action needed"
            fi
          done
